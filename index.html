<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌼</title>

    <!-- .. / .-.. --- ...- . / -.-- --- ..- -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --ivory: #F8F4EA;
            --warm-beige: #EADFCF;
            --soft-brown: #8B6F57;
            --muted-gold: #C9A66B;
            --bg-color: #2c251e;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Crimson Text', serif;
            color: var(--soft-brown);
        }

        body {
            overflow-y: auto;
            overflow-x: hidden;
            perspective: 1200px;
        }

        /* .. / .-.. --- ...- . / -.-- --- ..- */
        .bg-layer {
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-image: url('assets/bg.png');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.7) sepia(0.2);
            z-index: -2;
            transition: transform 0.5s ease-out;
            will-change: transform;
        }

        .sunlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 248, 220, 0.3) 0%, rgba(255, 255, 255, 0) 60%);
            z-index: -1;
            pointer-events: none;
            mix-blend-mode: soft-light;
        }

        .dust-particle,
        .petal {
            position: fixed;
            pointer-events: none;
            z-index: 100;
        }

        .dust-particle {
            background-color: rgba(255, 240, 200, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255, 240, 200, 0.4);
        }

        .scene-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            box-sizing: border-box;
        }

        /* .. / .-.. --- ...- . / -.-- --- ..- */
        .landing {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 1.5s ease 0.5s, visibility 1.5s ease 0.5s;
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background-color: var(--warm-beige);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 0 30px rgba(139, 111, 87, 0.15);
            border-radius: 4px;
            animation: float 5s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.4s ease;
            z-index: 10;
        }

        .envelope-wrapper:hover {
            transform: scale(1.03);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(139, 111, 87, 0.15);
        }

        .envelope-flap-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 125px solid var(--ivory);
            transform-origin: top;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 12;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.15));
        }

        .envelope-flap-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-bottom: 110px solid var(--warm-beige);
            z-index: 11;
        }

        .envelope-flap-left {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-top: 110px solid transparent;
            border-bottom: 110px solid transparent;
            border-left: 160px solid #e3d5c1;
            z-index: 10;
        }

        .envelope-flap-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 0;
            border-top: 110px solid transparent;
            border-bottom: 110px solid transparent;
            border-right: 160px solid #e3d5c1;
            z-index: 10;
        }

        .wax-seal {
            position: absolute;
            top: 100px;
            left: 135px;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #b23a3e, #851316);
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4), inset 0 0 8px rgba(0, 0, 0, 0.6);
            z-index: 13;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }

        .wax-seal::after {
            content: '❀';
            color: #520b0d;
            font-size: 26px;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.1);
        }

        .open-btn {
            margin-top: 50px;
            padding: 14px 36px;
            background-color: rgba(248, 244, 234, 0.1);
            border: 1px solid rgba(248, 244, 234, 0.5);
            color: var(--ivory);
            font-family: 'Crimson Text', serif;
            font-size: 1.25rem;
            letter-spacing: 1px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            animation: float 5s ease-in-out infinite 0.5s;
        }

        .open-btn:hover {
            background-color: var(--ivory);
            color: var(--soft-brown);
            border-color: var(--ivory);
            box-shadow: 0 0 20px rgba(248, 244, 234, 0.4);
        }

        /* .. / .-.. --- ...- . / -.-- --- ..- */
        .content-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            max-width: 650px;
            width: 100%;
            margin-top: 10vh;
            padding-bottom: 120px;
            z-index: 40;
            pointer-events: none;
            /* .. / .-.. --- ...- . / -.-- --- ..- */
        }

        .letter {
            width: 90%;
            max-width: 550px;
            background-color: var(--ivory);
            /* .. / .-.. --- ...- . / -.-- --- ..- */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" opacity="0.04"><rect width="300" height="300" fill="%23000" filter="url(%23noise)"/><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter></svg>');
            padding: 50px 45px;
            box-sizing: border-box;
            border-radius: 2px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3), inset 0 0 30px rgba(139, 111, 87, 0.1);
            color: #4a3e31;
            position: relative;

            /* .. / .-.. --- ...- . / -.-- --- ..- */
            transform: translateY(120px) scale(0.9) rotateX(15deg);
            opacity: 0;
            transform-origin: top;
            transition: transform 2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 2s ease;
            pointer-events: auto;
        }

        .letter::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: transparent;
            border: 1px solid rgba(139, 111, 87, 0.15);
            border-radius: 1px;
            pointer-events: none;
        }

        .secret-engraving {
            position: absolute;
            right: 12px;
            bottom: 30px;
            writing-mode: vertical-rl;
            color: rgba(139, 111, 87, 0.16);
            font-size: 0.65rem;
            letter-spacing: 4px;
            font-family: monospace;
            pointer-events: none;
            user-select: none;
        }

        .morse-ribbon {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 140px;
            height: 140px;
            overflow: hidden;
            pointer-events: none;
            z-index: 10;
        }
        .morse-ribbon::before,
        .morse-ribbon::after {
            position: absolute;
            z-index: -1;
            content: '';
            display: block;
            border: 4px solid #73614d;
        }
        .morse-ribbon::before {
            top: 0;
            right: 0;
            border-top-color: transparent;
            border-right-color: transparent;
        }
        .morse-ribbon::after {
            bottom: 0;
            left: 0;
            border-bottom-color: transparent;
            border-left-color: transparent;
        }
        .morse-ribbon span {
            position: absolute;
            display: block;
            width: 200px;
            padding: 8px 0;
            background-color: #a48c71;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            color: var(--ivory);
            font-size: 0.55rem;
            font-family: monospace;
            letter-spacing: 2px;
            text-align: center;
            left: -40px;
            top: 30px;
            transform: rotate(-45deg);
        }

        .handwritten {
            font-family: 'Caveat', cursive;
            color: var(--soft-brown);
        }

        .letter h1 {
            font-size: 2.8rem;
            margin-top: 0;
            margin-bottom: 35px;
            text-align: center;
            font-weight: 700;
        }

        .letter p {
            font-size: 1.25rem;
            line-height: 1.85;
            margin-bottom: 25px;
        }

        .typewriter-text {
            min-height: 160px;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: var(--soft-brown);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        .signature {
            font-size: 2.2rem;
            text-align: right;
            margin-top: 40px;
            margin-bottom: 0;
        }

        /* .. / .-.. --- ...- . / -.-- --- ..- */
        .stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 45px;
            height: 55px;
            background-color: #eee9dd;
            border: 2px dashed #bba;
            padding: 4px;
            opacity: 0.85;
            transform: rotate(6deg);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="45" height="55" viewBox="0 0 45 55"><circle cx="22.5" cy="27.5" r="15" stroke="%238B6F57" stroke-width="1.5" fill="none" opacity="0.6"/><path d="M10,27 Q22,12 35,27 Q22,42 10,27" stroke="%238B6F57" stroke-width="1" fill="none" opacity="0.6"/></svg>');
            background-size: cover;
            background-position: center;
            box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.1);
        }

        .pressed-flower {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 50px;
            height: auto;
            opacity: 0.7;
            transform: rotate(-20deg);
            filter: sepia(0.6) contrast(1.1);
        }

        /* .. / .-.. --- ...- . / -.-- --- ..- */
        .bouquet-container {
            margin-top: 60px;
            position: relative;
            width: 280px;
            height: 380px;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            animation: sway 7s ease-in-out infinite;

            /* .. / .-.. --- ...- . / -.-- --- ..- */
            transform: translateY(80px) scale(0.9);
            opacity: 0;
            transition: transform 2.5s cubic-bezier(0.25, 1, 0.5, 1) 0.3s, opacity 2.5s ease 0.3s;
            pointer-events: auto;
        }

        .bouquet-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.5)) contrast(1.05) brightness(0.95);
            /* .. / .-.. --- ...- . / -.-- --- ..- */
            mix-blend-mode: multiply;
            border-radius: 10px;
            /* .. / .-.. --- ...- . / -.-- --- ..- */
        }

        .bouquet-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            background: radial-gradient(circle, rgba(255, 230, 170, 0.4) 0%, rgba(255, 248, 220, 0) 70%);
            z-index: -1;
            filter: blur(25px);
            pointer-events: none;
        }

        /* .. / .-.. --- ...- . / -.-- --- ..- */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        @keyframes sway {

            0%,
            100% {
                transform: rotate(0deg) translateY(0);
            }

            25% {
                transform: rotate(3deg) translateY(-3px);
            }

            75% {
                transform: rotate(-3deg) translateY(3px);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes flutter {

            0%,
            100% {
                transform: translateY(0) scale(1) rotate(0);
            }

            33% {
                transform: translateY(-15px) scale(1.1) rotate(5deg);
            }

            66% {
                transform: translateY(5px) scale(0.95) rotate(-5deg);
            }
        }

        /* .. / .-.. --- ...- . / -.-- --- ..- */
        body.opened .landing {
            opacity: 0;
            visibility: hidden;
        }

        body.opened .letter {
            transform: translateY(0) scale(1) rotateX(0deg);
            opacity: 1;
        }

        body.opened .bouquet-container {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .envelope-wrapper.opening .envelope-flap-top {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.opening .wax-seal {
            opacity: 0;
        }

        /* .. / .-.. --- ...- . / -.-- --- ..- */
        @media (max-width: 768px) {
            .landing {
                transform: scale(0.85);
            }

            .content-scene {
                margin-top: 5vh;
                padding-bottom: 80px;
            }

            .letter {
                width: 92%;
                padding: 35px 20px;
            }

            .letter h1 {
                font-size: 2.2rem;
                margin-bottom: 25px;
            }

            .letter p {
                font-size: 1.1rem;
                line-height: 1.7;
            }

            .typewriter-text {
                min-height: 220px;
            }

            .bouquet-container {
                width: 200px;
                height: 270px;
                margin-top: 30px;
            }

            .video-embed {
                width: 95%;
                margin-top: 30px;
                padding: 8px 8px 25px 8px;
            }
        }

        /* .. / .-.. --- ...- . / -.-- --- ..- */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }

            .typewriter-text {
                min-height: auto;
            }

            .cursor {
                display: none;
            }
        }

        .video-embed {
            margin-top: 50px;
            width: 90%;
            max-width: 560px;
            background: #fcf9f2;
            padding: 10px 10px 35px 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 10px rgba(139,111,87,0.05);
            border-radius: 2px;
            pointer-events: auto;
            position: relative;
            z-index: 50;
            transform: rotate(-2deg);
        }
        
        .video-embed iframe {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            display: block;
        }

        /* .. / .-.. --- ...- . / -.-- --- ..- */
        .handdrawn-daffodil {
            position: fixed;
            width: 70px;
            height: 105px;
            opacity: 1;
            z-index: 100;
            pointer-events: none;
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.1));
            transform-origin: bottom center;
            animation: sway-flower var(--d, 6s) ease-in-out infinite;
        }

        @keyframes sway-flower {

            0%,
            100% {
                transform: scale(var(--s, 1)) rotate(var(--r, 0deg)) skewX(0deg);
            }

            20% {
                transform: scale(var(--s, 1)) rotate(calc(var(--r, 0deg) + 6deg)) skewX(2deg);
            }

            40% {
                transform: scale(var(--s, 1)) rotate(calc(var(--r, 0deg) - 1deg)) skewX(-1deg);
            }

            60% {
                transform: scale(var(--s, 1)) rotate(calc(var(--r, 0deg) + 4deg)) skewX(1deg);
            }

            80% {
                transform: scale(var(--s, 1)) rotate(calc(var(--r, 0deg) + 1deg)) skewX(0deg);
            }
        }

        .draw-path {
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
        }

        body.opened .draw-path {
            animation: drawLine 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards var(--delay, 0.8s);
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>

<body>

    <div class="bg-layer" id="bg-layer"></div>
    <div class="sunlight"></div>
    <div id="particles-container"></div>

    <div class="landing" id="landing">
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope-flap-left"></div>
            <div class="envelope-flap-right"></div>
            <div class="envelope-flap-bottom"></div>
            <div class="envelope-flap-top"></div>
            <div class="wax-seal"></div>
        </div>
        <button class="open-btn" id="open-btn">Open Letter</button>
    </div>

    <div class="scene-container">
        <div class="content-scene" id="content-scene">
            <div class="letter">
                <div class="morse-ribbon"><span>.. / .-.. --- ...- . / -.-- --- ..-</span></div>
                <div class="secret-engraving">.. / .-.. --- ...- . / -.-- --- ..-</div>
                <!-- .. / .-.. --- ...- . / -.-- --- ..- -->
                <div class="stamp"></div>

                <!-- .. / .-.. --- ...- . / -.-- --- ..- -->
                <svg class="pressed-flower" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50,80 Q45,50 50,20" stroke="#6b5b48" stroke-width="2.5" fill="none" opacity="0.8" />
                    <path d="M50,20 Q65,10 50,5 Q35,10 50,20" fill="#9b8265" opacity="0.9" />
                    <path d="M50,35 Q70,25 65,40 Q55,45 50,35" fill="#a48c71" opacity="0.85" />
                    <path d="M50,35 Q30,25 35,40 Q45,45 50,35" fill="#a48c71" opacity="0.85" />
                    <circle cx="50" cy="20" r="3" fill="#5a4938" />
                </svg>

                <h1 class="handwritten">For You 🌼</h1>
                <p class="typewriter-text"><span id="typewriter"></span><span class="cursor" id="cursor"></span></p>
                <p class="signature handwritten">With warmth,<br>Your Name</p>
            </div>

            <div class="bouquet-container" id="bouquet">
                <div class="bouquet-glow"></div>
                <img src="assets/bouquet.png" alt="Daffodil Bouquet" class="bouquet-img" loading="lazy">
            </div>

            <div class="video-embed">
                <iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/J7ck984Qhso?origin=http://localhost" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
        </div>
        <!-- .. / .-.. --- ...- . / -.-- --- ..- -->
        <div id="daffodil-field"></div>
    </div>

    <!-- .. / .-.. --- ...- . / -.-- --- ..- -->
    <audio id="bg-music" loop preload="auto">
        <source
            src="https://cdn.pixabay.com/download/audio/2022/11/02/audio_15f72033bc.mp3?filename=soft-piano-126298.mp3"
            type="audio/mpeg">
    </audio>
    <audio id="chime-sound" preload="auto">
        <source
            src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=magic-chime-01-92576.mp3"
            type="audio/mpeg">
    </audio>

    <script>
        // .. / .-.. --- ...- . / -.-- --- ..-
        const customMessage = "I stumbled upon these daffodils today and immediately thought of you. Some things in this world are simply too beautiful to keep to oneself. I hope they bring a little soft sunlight to your day, just as you always do to mine. Take a deep breath, everything is going to be wonderful.";

        // .. / .-.. --- ...- . / -.-- --- ..-
        const openBtn = document.getElementById('open-btn');
        const envelope = document.getElementById('envelope');
        const bgMusic = document.getElementById('bg-music');
        const chimeSound = document.getElementById('chime-sound');
        const typewriterEl = document.getElementById('typewriter');
        const cursorEl = document.getElementById('cursor');
        const bouquet = document.getElementById('bouquet');
        const particlesContainer = document.getElementById('particles-container');
        const bgLayer = document.getElementById('bg-layer');

        // .. / .-.. --- ...- . / -.-- --- ..-
        let hasOpened = false;

        // .. / .-.. --- ...- . / -.-- --- ..-
        function openLetter() {
            if (hasOpened) return;
            hasOpened = true;

            // .. / .-.. --- ...- . / -.-- --- ..-
            envelope.classList.add('opening');

            // .. / .-.. --- ...- . / -.-- --- ..-
            bgMusic.volume = 0.2;
            bgMusic.play().catch(e => console.log('Audio autoplay prevented.'));

            // .. / .-.. --- ...- . / -.-- --- ..-
            setTimeout(() => {
                document.body.classList.add('opened');

                // .. / .-.. --- ...- . / -.-- --- ..-
                const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

                if (prefersReducedMotion) {
                    typewriterEl.textContent = customMessage;
                    cursorEl.style.display = 'none';
                } else {
                    setTimeout(startTypewriter, 1800);
                }
            }, 1200);
        }

        function startTypewriter() {
            let i = 0;

            function type() {
                if (i < customMessage.length) {
                    // .. / .-.. --- ...- . / -.-- --- ..-
                    let char = customMessage.charAt(i);
                    typewriterEl.innerHTML += char;
                    i++;

                    let delay = 40 + (Math.random() * 30);
                    if (char === '.' || char === ',') delay += 300;

                    setTimeout(type, delay);
                } else {
                    cursorEl.style.display = 'none';
                }
            }
            type();
        }

        function createPetal(startX, startY) {
            const petal = document.createElement('div');
            petal.className = 'petal';

            // .. / .-.. --- ...- . / -.-- --- ..-
            petal.style.width = '14px';
            petal.style.height = '14px';
            petal.style.backgroundColor = 'var(--muted-gold)';
            petal.style.borderRadius = '50% 0 50% 0';
            petal.style.position = 'fixed';
            petal.style.left = startX + 'px';
            petal.style.top = startY + 'px';
            petal.style.opacity = '0.85';
            petal.style.boxShadow = '0 2px 6px rgba(0,0,0,0.15)';
            petal.style.transformOrigin = 'center';

            const duration = 3.5 + Math.random() * 3;
            petal.style.animation = `fall ${duration}s linear forwards`;

            particlesContainer.appendChild(petal);

            setTimeout(() => petal.remove(), duration * 1000);
        }

        function interactBouquet(e) {
            // .. / .-.. --- ...- . / -.-- --- ..-
            bouquet.style.transform = 'scale(1.06)';
            setTimeout(() => {
                bouquet.style.transform = 'scale(1)';
            }, 400);

            // .. / .-.. --- ...- . / -.-- --- ..-
            chimeSound.currentTime = 0;
            chimeSound.volume = 0.3;
            chimeSound.play().catch(e => { });

            // .. / .-.. --- ...- . / -.-- --- ..-
            const rect = bouquet.getBoundingClientRect();
            // .. / .-.. --- ...- . / -.-- --- ..-
            const x = (e.clientX || rect.left + rect.width / 2);
            const y = (e.clientY || rect.top + rect.height / 3);

            for (let i = 0; i < 4; i++) {
                setTimeout(() => {
                    createPetal(x + (Math.random() * 60 - 30), y + (Math.random() * 40 - 20));
                }, i * 150);
            }
        }

        // .. / .-.. --- ...- . / -.-- --- ..-
        function createDust() {
            if (document.hidden) return;
            const dust = document.createElement('div');
            dust.className = 'dust-particle';
            const size = Math.random() * 3 + 1.5;
            dust.style.width = size + 'px';
            dust.style.height = size + 'px';
            dust.style.left = (Math.random() * window.innerWidth) + 'px';
            dust.style.top = window.innerHeight + 'px';

            const duration = 15 + Math.random() * 20;
            dust.style.animation = `fall ${duration}s linear reverse forwards`;

            particlesContainer.appendChild(dust);

            setTimeout(() => dust.remove(), duration * 1000);
        }

        // .. / .-.. --- ...- . / -.-- --- ..-
        function createButterfly() {
            if (!hasOpened || document.hidden) return;

            const wrapper = document.createElement('div');
            wrapper.style.position = 'fixed';
            wrapper.style.left = '-30px';
            wrapper.style.top = (Math.random() * window.innerHeight * 0.7 + window.innerHeight * 0.1) + 'px';
            wrapper.style.zIndex = '90';
            wrapper.style.pointerEvents = 'none';

            const duration = 20 + Math.random() * 15;
            wrapper.style.transition = `transform ${duration}s linear`;

            const butterfly = document.createElement('div');
            butterfly.innerHTML = '🦋';
            butterfly.style.fontSize = '14px';
            butterfly.style.animation = `flutter 3s ease-in-out infinite`;
            butterfly.style.opacity = '0.65';
            butterfly.style.filter = 'sepia(0.6) hue-rotate(-20deg)';

            wrapper.appendChild(butterfly);
            particlesContainer.appendChild(wrapper);

            // .. / .-.. --- ...- . / -.-- --- ..-
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const destX = window.innerWidth + 100;
                    const destY = Math.random() * 300 - 150;
                    wrapper.style.transform = `translate(${destX}px, ${destY}px)`;
                });
            });

            setTimeout(() => wrapper.remove(), duration * 1000);
        }

        // .. / .-.. --- ...- . / -.-- --- ..-
        window.addEventListener('mousemove', (e) => {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 25;
            const y = (e.clientY / window.innerHeight - 0.5) * 25;
            bgLayer.style.transform = `translate(${-x}px, ${-y}px)`;
        });

        // .. / .-.. --- ...- . / -.-- --- ..-
        openBtn.addEventListener('click', openLetter);
        envelope.addEventListener('click', openLetter);
        bouquet.addEventListener('click', interactBouquet);

        // .. / .-.. --- ...- . / -.-- --- ..-
        if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            setInterval(createDust, 400);
            setInterval(() => {
                if (Math.random() > 0.6) createButterfly();
            }, 4000);

            // .. / .-.. --- ...- . / -.-- --- ..-
            setInterval(() => {
                if (hasOpened && Math.random() > 0.8) {
                    const rect = bouquet.getBoundingClientRect();
                    createPetal(rect.left + rect.width / 2 + (Math.random() * 60 - 30), rect.top + rect.height / 3);
                }
            }, 6000);
        }
        function createDaffodilsField() {
            const field = document.getElementById('daffodil-field');
            if (!field) return;
            const daffodilPathSVG = `
                <path class="draw-path stem" d="M 50 150 Q 55 100 45 60" stroke="#e8b923" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <path class="draw-path leaf" d="M 50 120 Q 25 90 20 70 Q 30 110 50 120" stroke="#e8b923" stroke-width="2" fill="none" stroke-linejoin="round"/>
                <path class="draw-path leaf" d="M 48 90 Q 75 70 85 50 Q 70 90 48 90" stroke="#e8b923" stroke-width="2" fill="none" stroke-linejoin="round"/>
                <path class="draw-path petal" d="M 45 60 Q 20 70 30 45 Q 40 55 45 60" stroke="#e8b923" stroke-width="2" fill="none" stroke-linejoin="round"/>
                <path class="draw-path petal" d="M 45 60 Q 40 30 55 35 Q 50 45 45 60" stroke="#e8b923" stroke-width="2" fill="none" stroke-linejoin="round"/>
                <path class="draw-path petal" d="M 45 60 Q 70 55 60 75 Q 50 65 45 60" stroke="#e8b923" stroke-width="2" fill="none" stroke-linejoin="round"/>
                <path class="draw-path petal" d="M 45 60 Q 60 85 40 85 Q 45 75 45 60" stroke="#e8b923" stroke-width="2" fill="none" stroke-linejoin="round"/>
                <path class="draw-path petal" d="M 45 60 Q 25 90 20 70 Q 35 70 45 60" stroke="#e8b923" stroke-width="2" fill="none" stroke-linejoin="round"/>
                <path class="draw-path corona" d="M 45 60 L 35 55 Q 30 65 35 75 L 45 60" stroke="#e8b923" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
            `;
            for (let i = 0; i < 93; i++) {
                // .. / .-.. --- ...- . / -.-- --- ..-
                const cols = 16;
                const col = i % cols;
                const row = Math.floor(i / cols);

                const jitterX = (Math.random() - 0.5) * 4;
                const jitterY = (Math.random() - 0.5) * 4;

                const left = (col * 6) + 2 + jitterX; // .. / .-.. --- ...- . / -.-- --- ..-
                const top = (row * 8) + 55 + jitterY; // .. / .-.. --- ...- . / -.-- --- ..-

                const scale = 0.6 + Math.random() * 0.3;
                const rot = (Math.random() * 40) - 20;
                const dur = 4 + Math.random() * 5;
                const delay = 0.2 + Math.random() * 2.5;

                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("class", "handdrawn-daffodil");
                svg.setAttribute("viewBox", "0 0 100 150");
                svg.style.left = left + 'vw';
                svg.style.top = top + 'vh';
                svg.style.setProperty('--r', rot + 'deg');
                svg.style.setProperty('--s', scale);
                svg.style.setProperty('--d', dur + 's');
                svg.style.setProperty('--delay', delay + 's');
                svg.innerHTML = daffodilPathSVG;
                field.appendChild(svg);
            }
        }
        createDaffodilsField();
    </script>
</body>

</html>
